version: 2

updates:
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    open-pull-requests-limit: 3
    schedule:
      interval: monthly
  - package-ecosystem: "nuget"
    directory: "/"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps"
    schedule:
      interval: monthly
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 3
    schedule:
      interval: monthly